name: Build ARM64 Binary

on:
  push:
    branches: [main]
    paths:
      - rust-wrapper/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup target add aarch64-unknown-linux-gnu

      - name: Build Release
        working-directory: rust-wrapper
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: claude-termux-arm64
          path: rust-wrapper/target/aarch64-unknown-linux-gnu/release/claude-termux
          retention-days: 30